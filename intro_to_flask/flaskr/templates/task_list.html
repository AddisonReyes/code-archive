<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>All Tasks</title>
  </head>
  <body>
    <h1>All Tasks</h1>
    <a href="{{ url_for('task') }}">Add new task</a>
    <ul>
      {% for task in tasks %}
        <li>
          <strong>Title:</strong> {{ task.title }} <br />
          <strong>Description:</strong>{{ task.description }} <br />
          <form action="{{ url_for('task_update', task_id=task.id) }}" method="post">
            <input type="submit" name="is_complete" value="1" {% if task.is_complete %}checked{% endif %} onchange="this.form.submit()" />
            <strong>Is complete:</strong> {{ task.is_complete }} <br />
          </form>
        </li>
        {% else %}
        <li>No tasks</li>
      {% endfor %}
    </ul>
  </body>
</html>
